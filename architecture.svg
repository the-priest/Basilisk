<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" role="img" aria-labelledby="archtitle archdesc" font-family="'IBM Plex Sans',system-ui,sans-serif">
  <title id="archtitle">Basilisk architecture: the model plans, deterministic tools execute and prove every exploit</title>
  <desc id="archdesc">A left-to-right pipeline of five stages. 1: the LLM reads the target's behaviour, picks the vulnerability class, and directs the next move. 2: deterministic exploit builders generate the payload. 3: the execution layer fires it through a hard safety gate. 4: a verified-exploitation oracle arms a proof marker and confirms or discards the result. 5: an evidence ledger stores a hashed receipt and never re-runs a solved bug. A feedback arrow returns the verdict (confirmed, failed, or pending) from the oracle to the model to inform the next move.</desc>

  <rect x="0" y="0" width="980" height="430" rx="18" fill="#0a0a0e"/>
  <rect x="0.5" y="0.5" width="979" height="429" rx="18" fill="none" stroke="#20202b"/>

  <text x="34" y="46" fill="#ff5a68" font-family="'IBM Plex Mono',monospace" font-size="13" letter-spacing="2">// HOW IT WORKS</text>
  <text x="34" y="78" fill="#f0ede8" font-size="24" font-weight="700" font-family="'Chakra Petch',sans-serif">The model plans. Deterministic tools execute and prove.</text>

  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#ff2b3d"/>
    </marker>
    <marker id="ahb" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#ff5a68"/>
    </marker>
  </defs>

  <!-- stage template: box + number + title + 2-line sub -->
  <!-- 1 MODEL -->
  <g>
    <rect x="24" y="120" width="160" height="128" rx="12" fill="#121219" stroke="#2d2d3b"/>
    <text x="40" y="146" fill="#ff5a68" font-family="'IBM Plex Mono',monospace" font-size="12">01</text>
    <text x="104" y="176" fill="#f0ede8" font-size="17" font-weight="700" text-anchor="middle" font-family="'Chakra Petch',sans-serif">MODEL</text>
    <text x="104" y="202" fill="#bbb7b0" font-size="12" text-anchor="middle">reads behaviour,</text>
    <text x="104" y="219" fill="#bbb7b0" font-size="12" text-anchor="middle">picks the vuln class,</text>
    <text x="104" y="236" fill="#bbb7b0" font-size="12" text-anchor="middle">directs the next move</text>
  </g>
  <!-- 2 BUILDERS -->
  <g>
    <rect x="217" y="120" width="160" height="128" rx="12" fill="#121219" stroke="#2d2d3b"/>
    <text x="233" y="146" fill="#ff5a68" font-family="'IBM Plex Mono',monospace" font-size="12">02</text>
    <text x="297" y="176" fill="#f0ede8" font-size="17" font-weight="700" text-anchor="middle" font-family="'Chakra Petch',sans-serif">BUILDERS</text>
    <text x="297" y="202" fill="#bbb7b0" font-size="12" text-anchor="middle">deterministic</text>
    <text x="297" y="219" fill="#bbb7b0" font-size="12" text-anchor="middle">generators build</text>
    <text x="297" y="236" fill="#bbb7b0" font-size="12" text-anchor="middle">the payload</text>
  </g>
  <!-- 3 EXECUTION -->
  <g>
    <rect x="410" y="120" width="160" height="128" rx="12" fill="#121219" stroke="#2d2d3b"/>
    <text x="426" y="146" fill="#ff5a68" font-family="'IBM Plex Mono',monospace" font-size="12">03</text>
    <text x="490" y="176" fill="#f0ede8" font-size="17" font-weight="700" text-anchor="middle" font-family="'Chakra Petch',sans-serif">EXECUTION</text>
    <text x="490" y="202" fill="#bbb7b0" font-size="12" text-anchor="middle">fires through a</text>
    <text x="490" y="219" fill="#bbb7b0" font-size="12" text-anchor="middle">hard safety gate</text>
    <text x="490" y="236" fill="#bbb7b0" font-size="12" text-anchor="middle">(destructive blocked)</text>
  </g>
  <!-- 4 ORACLE -->
  <g>
    <rect x="603" y="120" width="160" height="128" rx="12" fill="#150e12" stroke="#ff2b3d"/>
    <text x="619" y="146" fill="#ff5a68" font-family="'IBM Plex Mono',monospace" font-size="12">04</text>
    <text x="683" y="176" fill="#f0ede8" font-size="17" font-weight="700" text-anchor="middle" font-family="'Chakra Petch',sans-serif">ORACLE</text>
    <text x="683" y="202" fill="#ffb9bf" font-size="12" text-anchor="middle">arms a proof marker,</text>
    <text x="683" y="219" fill="#ffb9bf" font-size="12" text-anchor="middle">fires, then CONFIRMS</text>
    <text x="683" y="236" fill="#ffb9bf" font-size="12" text-anchor="middle">or discards</text>
  </g>
  <!-- 5 LEDGER -->
  <g>
    <rect x="796" y="120" width="160" height="128" rx="12" fill="#121219" stroke="#2d2d3b"/>
    <text x="812" y="146" fill="#ff5a68" font-family="'IBM Plex Mono',monospace" font-size="12">05</text>
    <text x="876" y="176" fill="#f0ede8" font-size="17" font-weight="700" text-anchor="middle" font-family="'Chakra Petch',sans-serif">LEDGER</text>
    <text x="876" y="202" fill="#bbb7b0" font-size="12" text-anchor="middle">hashed evidence,</text>
    <text x="876" y="219" fill="#bbb7b0" font-size="12" text-anchor="middle">never re-runs</text>
    <text x="876" y="236" fill="#bbb7b0" font-size="12" text-anchor="middle">a solved bug</text>
  </g>

  <!-- forward arrows -->
  <line x1="188" y1="184" x2="213" y2="184" stroke="#ff2b3d" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="381" y1="184" x2="406" y2="184" stroke="#ff2b3d" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="574" y1="184" x2="599" y2="184" stroke="#ff2b3d" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="767" y1="184" x2="792" y2="184" stroke="#ff2b3d" stroke-width="2" marker-end="url(#ah)"/>

  <!-- feedback loop: oracle -> model -->
  <path d="M683,248 L683,336 Q683,352 667,352 L120,352 Q104,352 104,336 L104,248"
        fill="none" stroke="#ff5a68" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ahb)"/>
  <rect x="330" y="338" width="320" height="28" rx="14" fill="#0a0a0e"/>
  <text x="490" y="357" fill="#bbb7b0" font-size="12.5" text-anchor="middle" font-family="'IBM Plex Mono',monospace">verdict feeds the next move — nothing counts until it is proven</text>

  <text x="34" y="404" fill="#7a7480" font-size="12.5">No proof, no finding. The model never improvises or trusts its own memory — which is why the scores hold up on clean, unseen targets.</text>
</svg>
